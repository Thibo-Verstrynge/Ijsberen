<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ice Swim Bet</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(to bottom,#e9f4ff,#cfe9ff);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1 {
  margin-bottom:20px;
}

/* ===== LAYOUT ===== */
.wrapper {
  position:relative;
  width:100%;
  max-width:900px;
}

/* central image */
.scene-img {
  width:100%;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* ===== PLAYER CARDS ===== */
.player {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:170px;
  padding:15px;
  border-radius:18px;
  text-align:center;

  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.25);
  border:1px solid rgba(255,255,255,0.4);

  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* positions */
.left { left:-190px; }
.right { right:-190px; }

/* avatars */
.avatar {
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid white;
  margin-bottom:5px;
}

/* names */
.player h2 {
  margin:5px 0;
  font-size:18px;
}

/* CLOCK */
.clock {
  font-size:32px;
  font-weight:700;
  margin:10px 0;
  letter-spacing:1px;
}

/* color themes */
.lien {
  box-shadow:0 0 25px rgba(0,150,255,0.3);
}
.lien .clock {
  color:#0077ff;
}

.thibo {
  box-shadow:0 0 25px rgba(255,140,0,0.3);
}
.thibo .clock {
  color:#ff7a00;
}

/* buttons */
button {
  padding:6px 10px;
  margin:3px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.8);
  cursor:pointer;
}

button:hover {
  background:white;
}

/* ===== HIGHLIGHT ===== */
.player.highlight {
  animation:flash 0.6s ease;
}

@keyframes flash {
  0% { transform:translateY(-50%) scale(1); }
  30% { transform:translateY(-50%) scale(1.1); }
  60% { transform:translateY(-50%) scale(0.95); }
  100% { transform:translateY(-50%) scale(1); }
}

.player.shake {
  animation:shake 0.4s;
}

@keyframes shake {
  0% { transform:translateY(-50%) translateX(0); }
  25% { transform:translateY(-50%) translateX(-4px); }
  50% { transform:translateY(-50%) translateX(4px); }
  75% { transform:translateY(-50%) translateX(-3px); }
  100% { transform:translateY(-50%) translateX(0); }
}

/* mobile */
@media (max-width:900px){
  .player {
    position:static;
    transform:none;
    margin:10px 0;
    width:100%;
  }

  .wrapper {
    display:flex;
    flex-direction:column;
    align-items:center;
  }
}
</style>
</head>

<body>

<h1>Ice Swim Bet</h1>

<div class="wrapper">

  <!-- IMAGE -->
  <img src="a_vibrant_cartoon_illustration_style_scene_a_snow.png" class="scene-img"/>

  <!-- LIEN (LEFT) -->
  <div class="player left lien" id="lienCard">
    <img src="lien.png" class="avatar"/>
    <h2>Lien</h2>
    <div class="clock" id="lienTime">00:00</div>
    <button onclick="addTime('lien',20)">+20s</button>
    <button onclick="addTime('lien',60)">+60s</button>
  </div>

  <!-- THIBO (RIGHT) -->
  <div class="player right thibo" id="thiboCard">
    <img src="thibo.png" class="avatar"/>
    <h2>Thibo</h2>
    <div class="clock" id="thiboTime">00:00</div>
    <button onclick="addTime('thibo',20)">+20s</button>
    <button onclick="addTime('thibo',60)">+60s</button>
  </div>

</div>

<script>
const STORAGE = "ice-swim-v8";

let thibo = 0;
let lien = 0;

function format(t){
  return String(Math.floor(t/60)).padStart(2,'0') + ":" +
         String(t%60).padStart(2,'0');
}

function save(){
  localStorage.setItem(STORAGE, JSON.stringify({thibo,lien}));
}

function load(){
  const data = JSON.parse(localStorage.getItem(STORAGE));
  if(data){
    thibo = data.thibo || 0;
    lien = data.lien || 0;
  }
}

function render(){
  document.getElementById("thiboTime").innerText = format(thibo);
  document.getElementById("lienTime").innerText = format(lien);
}

function addTime(person, sec){
  const card = document.getElementById(person + "Card");

  if(person==="thibo") thibo += sec;
  else lien += sec;

  card.classList.remove("highlight","shake");
  void card.offsetWidth;
  card.classList.add("highlight","shake");

  save();
  render();
}

window.onload = () => {
  load();
  render();
};
</script>

</body>
</html>
