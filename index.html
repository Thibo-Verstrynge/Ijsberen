<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ice Swim Bet</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(to bottom,#e9f4ff,#cfe9ff);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1 { font-weight:600; }

.container {
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  max-width:800px;
  gap:20px;
}

.player {
  flex:1;
  text-align:center;
}

.clock {
  font-size:26px;
  margin:10px 0;
}

button {
  padding:6px 10px;
  margin:3px;
  border-radius:8px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}

/* ===== SCENE ===== */
.scene {
  position:relative;
  width:300px;
  height:200px;
  overflow:hidden;
}

.lake {
  position:absolute;
  bottom:0;
  width:100%;
  height:90px;
  background:linear-gradient(180deg,#5bbcff,#0077cc);
  border-radius:50%;
}

/* moving water */
.lake::before {
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:rgba(255,255,255,0.15);
  animation:wave 5s linear infinite;
}

@keyframes wave {
  from { transform:translateX(-50%); }
  to { transform:translateX(0%); }
}

.mountain {
  position:absolute;
  bottom:80px;
  width:0;
  height:0;
  border-left:60px solid transparent;
  border-right:60px solid transparent;
  border-bottom:100px solid #7fbf7f;
}

.left { left:10px; }
.right { right:10px; }

/* ===== SWIMMERS ===== */
.swimmer {
  position:absolute;
  bottom:80px;
  width:80px;
  height:80px;
  transition:left 1s linear;
}

/* body */
.body {
  width:80px;
  height:80px;
  position:absolute;
}

/* head image */
.head {
  position:absolute;
  top:-10px;
  left:20px;
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid white;
}

/* simple swimming arms */
.arm {
  position:absolute;
  width:40px;
  height:4px;
  background:#333;
  top:40px;
  left:20px;
  transform-origin:left;
  animation:stroke 1.2s infinite ease-in-out;
}

@keyframes stroke {
  0% { transform:rotate(20deg); }
  50% { transform:rotate(-20deg); }
  100% { transform:rotate(20deg); }
}

/* ripple follows swimmer */
.ripple {
  position:absolute;
  bottom:-10px;
  left:20px;
  width:40px;
  height:40px;
  border:2px solid rgba(255,255,255,0.6);
  border-radius:50%;
  animation:ripple 2s infinite;
}

@keyframes ripple {
  0% { transform:scale(0.5); opacity:0.6; }
  100% { transform:scale(2.5); opacity:0; }
}
</style>
</head>

<body>

<h1>Ice Swim Bet</h1>

<div class="container">

<!-- Thibo -->
<div class="player">
  <h2>Thibo</h2>
  <div class="clock" id="thiboTime">00:00</div>
  <button onclick="addTime('thibo',20)">+20s</button>
  <button onclick="addTime('thibo',60)">+60s</button>
</div>

<!-- Scene -->
<div class="scene">
  <div class="mountain left"></div>
  <div class="mountain right"></div>
  <div class="lake"></div>

  <!-- Thibo swimmer -->
  <div class="swimmer" id="thiboSwimmer">
    <img class="head" src="thibo.png"/>
    <div class="body"></div>
    <div class="arm"></div>
    <div class="ripple"></div>
  </div>

  <!-- Lien swimmer -->
  <div class="swimmer" id="lienSwimmer">
    <img class="head" src="lien.png"/>
    <div class="body"></div>
    <div class="arm"></div>
    <div class="ripple"></div>
  </div>

</div>

<!-- Lien -->
<div class="player">
  <h2>Lien</h2>
  <div class="clock" id="lienTime">00:00</div>
  <button onclick="addTime('lien',20)">+20s</button>
  <button onclick="addTime('lien',60)">+60s</button>
</div>

</div>

<script>
const STORAGE = "ice-swim-v3";

let thibo = 0;
let lien = 0;

/* swimmers move across lake based on time */
function updatePositions() {
  const maxTime = 600; // 10 min full swim across

  const tProgress = Math.min(thibo / maxTime, 1);
  const lProgress = Math.min(lien / maxTime, 1);

  document.getElementById("thiboSwimmer").style.left = (20 + tProgress * 180) + "px";
  document.getElementById("lienSwimmer").style.left = (20 + lProgress * 180) + "px";
}

function format(t){
  return String(Math.floor(t/60)).padStart(2,'0') + ":" +
         String(t%60).padStart(2,'0');
}

function save(){
  localStorage.setItem(STORAGE, JSON.stringify({thibo,lien}));
}

function load(){
  const data = JSON.parse(localStorage.getItem(STORAGE));
  if(data){
    thibo = data.thibo || 0;
    lien = data.lien || 0;
  }
}

function render(){
  document.getElementById("thiboTime").innerText = format(thibo);
  document.getElementById("lienTime").innerText = format(lien);
  updatePositions();
}

function addTime(person, sec){
  if(person==="thibo") thibo += sec;
  else lien += sec;

  save();
  render();
}

window.onload = () => {
  load();
  render();
};
</script>

</body>
</html>
