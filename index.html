<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ice Swim Bet</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(to bottom,#e9f4ff,#cfe9ff);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1 {
  margin-bottom:20px;
}

/* ===== LAYOUT ===== */
.wrapper {
  position:relative;
  width:100%;
  max-width:900px;
}

/* central image */
.scene-img {
  width:100%;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* player panels */
.player {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:160px;
  background:white;
  padding:15px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  text-align:center;
  transition:transform 0.2s;
}

/* left / right */
.player.left { left:-180px; }
.player.right { right:-180px; }

.player h2 {
  margin:5px 0;
}

.clock {
  font-size:28px;
  margin:10px 0;
  font-weight:600;
}

/* buttons */
button {
  padding:6px 10px;
  margin:3px;
  border-radius:8px;
  border:1px solid #ccc;
  background:#f9f9f9;
  cursor:pointer;
}

button:hover {
  background:#eef6ff;
}

button:active {
  transform:scale(0.96);
}

/* ===== HIGHLIGHT EFFECT ===== */
.player.highlight {
  animation: highlightFlash 0.6s ease;
}

@keyframes highlightFlash {
  0% {
    transform: translateY(-50%) scale(1);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
  }
  30% {
    transform: translateY(-50%) scale(1.08);
    box-shadow:0 0 25px rgba(0,150,255,0.8);
  }
  60% {
    transform: translateY(-50%) scale(0.98);
  }
  100% {
    transform: translateY(-50%) scale(1);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
  }
}

/* shake */
.player.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translateY(-50%) translateX(0); }
  25% { transform: translateY(-50%) translateX(-4px); }
  50% { transform: translateY(-50%) translateX(4px); }
  75% { transform: translateY(-50%) translateX(-3px); }
  100% { transform: translateY(-50%) translateX(0); }
}

/* mobile */
@media (max-width:900px){
  .player {
    position:static;
    transform:none;
    margin:10px 0;
    width:100%;
  }

  .wrapper {
    display:flex;
    flex-direction:column;
    align-items:center;
  }
}
</style>
</head>

<body>

<h1>Ice Swim Bet</h1>

<div class="wrapper">

  <!-- IMAGE -->
  <img src="austria.png" class="scene-img"/>

  <!-- THIBO -->
  <div class="player left" id="thiboCard">
    <h2>Thibo</h2>
    <div class="clock" id="thiboTime">00:00</div>
    <button onclick="addTime('thibo',20)">+20s</button>
    <button onclick="addTime('thibo',60)">+60s</button>
  </div>

  <!-- LIEN -->
  <div class="player right" id="lienCard">
    <h2>Lien</h2>
    <div class="clock" id="lienTime">00:00</div>
    <button onclick="addTime('lien',20)">+20s</button>
    <button onclick="addTime('lien',60)">+60s</button>
  </div>

</div>

<script>
const STORAGE = "ice-swim-v7";

let thibo = 0;
let lien = 0;

function format(t){
  return String(Math.floor(t/60)).padStart(2,'0') + ":" +
         String(t%60).padStart(2,'0');
}

function save(){
  localStorage.setItem(STORAGE, JSON.stringify({thibo,lien}));
}

function load(){
  const data = JSON.parse(localStorage.getItem(STORAGE));
  if(data){
    thibo = data.thibo || 0;
    lien = data.lien || 0;
  }
}

function render(){
  document.getElementById("thiboTime").innerText = format(thibo);
  document.getElementById("lienTime").innerText = format(lien);
}

function addTime(person, sec){
  const card = document.getElementById(person + "Card");

  if(person==="thibo") thibo += sec;
  else lien += sec;

  // trigger animation
  card.classList.remove("highlight","shake");
  void card.offsetWidth;
  card.classList.add("highlight","shake");

  save();
  render();
}

window.onload = () => {
  load();
  render();
};
</script>

</body>
</html>
