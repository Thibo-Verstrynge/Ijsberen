<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ice Swim Bet</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e9f4ff;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 30px;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 500px;
      gap: 20px;
    }

    .player {
      flex: 1;
      text-align: center;
    }

    .clock {
      font-size: 28px;
      font-weight: 500;
      margin: 10px 0 15px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    button {
      padding: 6px 10px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.97);
    }

    /* Scene */
    .scene {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .lake {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 45px;
      background: #4da6ff;
      border-radius: 50%;
    }

    .swimmer {
      position: absolute;
      bottom: 35px;
      width: 20px;
      height: 20px;
      background: #333;
      border-radius: 50%;
    }

    .swimmer.left {
      left: 25px;
    }

    .swimmer.right {
      right: 25px;
    }

    .mountain {
      position: absolute;
      bottom: 40px;
      width: 0;
      height: 0;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      border-bottom: 80px solid #7fbf7f;
    }

    .mountain.left {
      left: -10px;
    }

    .mountain.right {
      right: -10px;
    }

    @media (max-width: 600px) {
      .container {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<h1>Ice Swim Bet</h1>

<div class="container">

  <!-- Thibo -->
  <div class="player">
    <h2>Thibo</h2>
    <div class="clock" id="thiboTime">00:00</div>

    <div class="buttons">
      <button onclick="addTime('thibo',20)">+20s</button>
      <button onclick="addTime('thibo',60)">+60s</button>
    </div>
  </div>

  <!-- Scene -->
  <div class="scene">
    <div class="mountain left"></div>
    <div class="mountain right"></div>
    <div class="lake"></div>

    <div class="swimmer left"></div>
    <div class="swimmer right"></div>
  </div>

  <!-- Lien -->
  <div class="player">
    <h2>Lien</h2>
    <div class="clock" id="lienTime">00:00</div>

    <div class="buttons">
      <button onclick="addTime('lien',20)">+20s</button>
      <button onclick="addTime('lien',60)">+60s</button>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY = "ice-swim-bet-v1";

let thibo = 0;
let lien = 0;

// Format time as MM:SS
function formatTime(totalSeconds) {
  const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
  const seconds = String(totalSeconds % 60).padStart(2, '0');
  return `${minutes}:${seconds}`;
}

// Save to localStorage (single object = safer)
function save() {
  const data = {
    thibo,
    lien
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// Load from localStorage
function load() {
  const saved = localStorage.getItem(STORAGE_KEY);

  if (saved) {
    try {
      const data = JSON.parse(saved);
      thibo = data.thibo || 0;
      lien = data.lien || 0;
    } catch (e) {
      console.error("Failed to load saved data");
    }
  }
}

// Update UI
function updateDisplay() {
  document.getElementById("thiboTime").innerText = formatTime(thibo);
  document.getElementById("lienTime").innerText = formatTime(lien);
}

// Add time
function addTime(player, seconds) {
  if (player === "thibo") thibo += seconds;
  else lien += seconds;

  save();
  updateDisplay();
}

// Initialize on page load
window.onload = () => {
  load();
  updateDisplay();
};
</script>

</body>
</html>
