<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ice Swim Bet</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(to bottom,#e9f4ff,#cfe9ff);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1 {
  font-weight:600;
  margin-bottom:20px;
}

.container {
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  max-width:850px;
  gap:20px;
}

.player {
  flex:1;
  text-align:center;
}

.clock {
  font-size:26px;
  margin:10px 0;
}

/* buttons */
button {
  padding:6px 10px;
  margin:3px;
  border-radius:8px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}

button:active {
  transform:scale(0.97);
}

/* ===== SCENE ===== */
.scene {
  position:relative;
  width:320px;
  height:220px;
  overflow:hidden;
}

.lake {
  position:absolute;
  bottom:0;
  width:100%;
  height:100px;
  background:linear-gradient(180deg,#5bbcff,#0077cc);
  border-radius:50%;
}

/* water movement */
.lake::before {
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:rgba(255,255,255,0.15);
  animation:wave 5s linear infinite;
}

@keyframes wave {
  from { transform:translateX(-50%); }
  to { transform:translateX(0%); }
}

/* mountains */
.mountain {
  position:absolute;
  bottom:90px;
  width:0;
  height:0;
  border-left:60px solid transparent;
  border-right:60px solid transparent;
  border-bottom:100px solid #7fbf7f;
}

.left { left:10px; }
.right { right:10px; }

/* ===== SWIMMER RIG ===== */
.swimmer {
  position:absolute;
  bottom:95px;
  width:90px;
  height:90px;
  transition:left 1s linear;

  animation: floatRig 2.8s ease-in-out infinite;
  transform-origin:center;
}

/* floating body rig */
@keyframes floatRig {
  0%   { transform: translateY(0px) rotate(-2deg); }
  25%  { transform: translateY(-3px) rotate(1deg); }
  50%  { transform: translateY(-6px) rotate(2deg); }
  75%  { transform: translateY(-3px) rotate(-1deg); }
  100% { transform: translateY(0px) rotate(-2deg); }
}

/* HEAD (your uploaded images) */
.head {
  position:absolute;
  top:0;
  left:25px;
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid white;

  animation: headTilt 2.8s ease-in-out infinite;
}

@keyframes headTilt {
  0% { transform:rotate(-3deg); }
  50% { transform:rotate(3deg); }
  100% { transform:rotate(-3deg); }
}

/* body */
.body {
  position:absolute;
  top:35px;
  left:35px;
  width:10px;
  height:30px;
  background:rgba(0,0,0,0.6);
  border-radius:5px;
}

/* arms (swimming stroke) */
.arm {
  position:absolute;
  top:40px;
  left:20px;
  width:50px;
  height:4px;
  background:rgba(0,0,0,0.7);
  transform-origin:left;
  animation:stroke 1.1s ease-in-out infinite;
}

@keyframes stroke {
  0% { transform:rotate(25deg); }
  50% { transform:rotate(-25deg); }
  100% { transform:rotate(25deg); }
}

/* ripple effect */
.ripple {
  position:absolute;
  bottom:-10px;
  left:20px;
  width:40px;
  height:40px;
  border:2px solid rgba(255,255,255,0.5);
  border-radius:50%;
  animation:ripple 2s infinite;
}

@keyframes ripple {
  0% { transform:scale(0.5); opacity:0.6; }
  100% { transform:scale(2.5); opacity:0; }
}

/* 🥶 shake effect on penalty */
.shake {
  animation:shake 0.4s linear;
}

@keyframes shake {
  0% { transform:translateX(0); }
  20% { transform:translateX(-4px); }
  40% { transform:translateX(4px); }
  60% { transform:translateX(-3px); }
  80% { transform:translateX(3px); }
  100% { transform:translateX(0); }
}

@media (max-width:850px){
  .container { flex-direction:column; }
}
</style>
</head>

<body>

<h1>Ice Swim Bet</h1>

<div class="container">

<!-- Thibo -->
<div class="player">
  <h2>Thibo</h2>
  <div class="clock" id="thiboTime">00:00</div>
  <button onclick="addTime('thibo',20)">+20s</button>
  <button onclick="addTime('thibo',60)">+60s</button>
</div>

<!-- Scene -->
<div class="scene">
  <div class="mountain left"></div>
  <div class="mountain right"></div>
  <div class="lake"></div>

  <!-- Thibo -->
  <div class="swimmer" id="thiboSwimmer">
    <img class="head" src="thibo.png"/>
    <div class="body"></div>
    <div class="arm"></div>
    <div class="ripple"></div>
  </div>

  <!-- Lien -->
  <div class="swimmer" id="lienSwimmer">
    <img class="head" src="lien.png"/>
    <div class="body"></div>
    <div class="arm"></div>
    <div class="ripple"></div>
  </div>

</div>

<!-- Lien -->
<div class="player">
  <h2>Lien</h2>
  <div class="clock" id="lienTime">00:00</div>
  <button onclick="addTime('lien',20)">+20s</button>
  <button onclick="addTime('lien',60)">+60s</button>
</div>

</div>

<script>
const STORAGE = "ice-swim-v4";

let thibo = 0;
let lien = 0;

/* format clock */
function format(t){
  return String(Math.floor(t/60)).padStart(2,'0') + ":" +
         String(t%60).padStart(2,'0');
}

/* save */
function save(){
  localStorage.setItem(STORAGE, JSON.stringify({thibo,lien}));
}

/* load */
function load(){
  const data = JSON.parse(localStorage.getItem(STORAGE));
  if(data){
    thibo = data.thibo || 0;
    lien = data.lien || 0;
  }
}

/* swimmers move across lake based on penalty time */
function updatePositions(){
  const max = 600; // full crossing

  const tp = Math.min(thibo / max, 1);
  const lp = Math.min(lien / max, 1);

  document.getElementById("thiboSwimmer").style.left = (20 + tp * 220) + "px";
  document.getElementById("lienSwimmer").style.left = (20 + lp * 220) + "px";
}

/* render */
function render(){
  document.getElementById("thiboTime").innerText = format(thibo);
  document.getElementById("lienTime").innerText = format(lien);
  updatePositions();
}

/* add time + shake */
function addTime(person, sec){
  const el = document.getElementById(person + "Swimmer");

  if(person==="thibo") thibo += sec;
  else lien += sec;

  /* shake animation */
  el.classList.remove("shake");
  void el.offsetWidth;
  el.classList.add("shake");

  save();
  render();
}

window.onload = () => {
  load();
  render();
};
</script>

</body>
</html>
